services:
  agentk:
    build: .
    container_name: agentk-mcp
    
    # [TRUQUE DO LINUX]
    # "host" faz o container usar a mesma rede do seu computador.
    # Isso permite acessar:
    # 1. Ollama em localhost:11434
    # 2. Minikube IP
    network_mode: "host"

    environment:
      # Passa a chave da OpenAI se estiver no .env ou variável de ambiente
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Força o Python a ver a pasta src
      - PYTHONPATH=/app
    
    volumes:
      # 1. Hot Reload: Se você mudar código na pasta src/, o container atualiza
      - ./src:/app/src
      
      # 2. Kubeconfig: Mapeia seu arquivo de config para o root do container
      - ~/.kube/config:/root/.kube/config
      
      # 3. Certificados Minikube: O config do K8s procura certs em /home/vitordie/.minikube
      # Precisamos garantir que esse caminho exista DENTRO do container igualzinho fora.
      - ~/.minikube:${HOME}/.minikube

    # Reinicia se falhar (mas não se você parar manualmente)
    restart: on-failure
